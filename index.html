<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שניר</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #1a1a1a;
      color: #f9f9f9;
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 3rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #1a1a1a;
      margin: 0 auto 3rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-btn {
      display: block;
      padding: 1rem 2rem;
      border: 1.5px solid #1a1a1a;
      border-radius: 8px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    .link-btn:hover {
      background: #1a1a1a;
      color: #f9f9f9;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">ש</div>
    <h1>שניר זיו</h1>
    <p class="tagline">ברוכים הבאים לאתר שלי</p>
    <div class="divider"></div>
    <div class="links">
      <a href="#" class="link-btn">עליי</a>
      <a href="#" class="link-btn">פרויקטים</a>
      <a href="#" class="link-btn">צור קשר</a>
    </div>
    <footer>© 2026 שניר זיו</footer>
  </div>
</body>
</html>
